<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Mighty Gamers</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="index">
    <header>
      <nav>
        <a href="index.html"></a>
        <img class="logo" src="img/logo.png" alt="Logo" />

        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="consolas.html">Consolas</a></li>
          <li><a href="titulos.html">Titulos</a></li>
          <li><a href="contacto.html">contacto</a></li>
        </ul>
      </nav>
    </header>

    <main class="reason-title">
      <main class="container my-5">
        <h1 class="text-center mb-4 text-white font-orbitron">
          Misión de Contacto
        </h1>

        <section class="form-container-gamer">
          <!-- Agregamos una tarjeta con efecto cristal -->
          <div class="glass-card p-4 p-md-5">
            <form id="form" action="#">
              <div class="row">
                <!-- Fila 1: Nombre y Apellido -->
                <div class="col-md-6 mb-3">
                  <label for="name" class="form-label"
                    >Nombre del Jugador</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    required
                    placeholder="Ej: Kratos"
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="lastName" class="form-label">Apellido</label>
                  <input
                    type="text"
                    class="form-control"
                    id="lastName"
                    required
                    placeholder="Tu apellido"
                  />
                </div>
              </div>

              <div class="row">
                <!-- Fila 2: Email y Teléfono -->
                <div class="col-md-6 mb-3">
                  <label for="email" class="form-label"
                    >Correo Electrónico</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    required
                    placeholder="nombre@casilla.com"
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="phone" class="form-label"
                    >WhatsApp de Soporte</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="phone"
                    required
                    placeholder="+54 11 1234-5678"
                  />
                </div>
              </div>

              <!-- Motivo (Actualizado a Gaming) -->
              <div class="mb-3">
                <label for="reason" class="form-label"
                  >¿En qué podemos ayudarte?</label
                >
                <select class="form-select" name="reason" id="reason" required>
                  <option value="" disabled selected>
                    Selecciona tu misión...
                  </option>
                  <option value="buy">
                    Comprar un título (Digital/Físico)
                  </option>
                  <option value="console">
                    Consulta técnica sobre consolas
                  </option>
                  <option value="claim">Soporte con mi cuenta</option>
                  <option value="other">Otros temas</option>
                </select>
              </div>

              <!-- ¿Eres cliente? -->
              <div class="mb-3">
                <h5 class="mb-2">¿Ya eres parte de nuestra comunidad?</h5>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    required
                    id="client-yes"
                    value="yes"
                    name="is-client"
                  />
                  <label class="form-check-label" for="client-yes"
                    >Sí, ya compro aquí</label
                  >
                </div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    id="client-no"
                    value="no"
                    name="is-client"
                  />
                  <label class="form-check-label" for="client-no"
                    >No, es mi primera vez</label
                  >
                </div>
              </div>

              <div class="mb-4">
                <label for="comment" class="form-label"
                  >Detalles de la consulta</label
                >
                <textarea
                  class="form-control"
                  rows="4"
                  name="comment"
                  id="comment"
                  required
                  placeholder="Cuéntanos más..."
                ></textarea>
              </div>

              <div class="d-flex gap-3">
                <button class="btn btn-gamer-cyan w-100" type="submit">
                  Enviar Mensaje
                </button>
                <button class="btn btn-outline-danger" type="reset">
                  Reiniciar
                </button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </main>

    <footer>
      <nav>


        <ul class="footer">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="consolas.html">Consolas</a></li>
          <li><a href="titulos.html">Titulos</a></li>
          <li><a href="contacto.html">contacto</a></li>
        </ul>
      </nav>
      <p>© 2026 Mighty Gamers, srl. todos los derechos reservados.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
